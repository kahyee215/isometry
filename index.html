                                    </td>
                                    <td className="p-4 text-slate-800 font-bold text-[13px]">📍 {c.geo}</td>
                                    <td className="p-4 text-slate-700 font-semibold text-xs">{c.fiat}</td>
                                    <td className="p-4 text-indigo-600 font-bold text-[11px] leading-relaxed">{c.crypto}</td>
                                    <td className="p-4">
                                      <span className={`px-2 py-1.5 rounded-lg text-[10px] font-bold inline-block border ${isHardLicense ? 'bg-amber-50 text-amber-800 border-amber-200 shadow-sm' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                                        {isHardLicense && '🏛️ '}{c.licenseName}
                                      </span>
                                    </td>
                                  </tr>
                                );
                              })}
                            </React.Fragment>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* ------------------------------------------------------------------------- */}
                  {/* Tab 6: Revenue Mechanics */}
                  {/* ------------------------------------------------------------------------- */}
                  {activeTab === 'Revenue' && (
                    <div className="overflow-x-auto animate-fade-in bg-white border border-slate-200 rounded-xl shadow-sm">
                      <div className="bg-slate-50 p-5 border-b border-slate-200">
                        <h3 className="font-bold text-slate-800 text-lg">各公司商业盈利模式穿透</h3>
                        <p className="text-xs text-slate-500 mt-1">企业在 8 大核心节点上的价值捕获方式。</p>
                      </div>
                      <table className="w-full text-left text-sm border-collapse">
                        <thead>
                          <tr className="border-b border-slate-200 text-slate-700">
                            <th className="p-4 font-bold w-[12%] bg-slate-100">公司</th>
                            <th className="p-2 font-bold border-l border-white bg-emerald-50 leading-tight text-center">1. 法币入金<br/><span className="text-[10px] font-normal text-slate-500">On-ramp Fee</span></th>
                            <th className="p-2 font-bold border-l border-white bg-amber-50 leading-tight text-center">2. 托管/司库<br/><span className="text-[10px] font-normal text-slate-500">Custody/AUM</span></th>
                            <th className="p-2 font-bold border-l border-white bg-orange-50 leading-tight text-center">3. 发行稳定币<br/><span className="text-[10px] font-normal text-slate-500">Yield/Issuance</span></th>
                            <th className="p-2 font-bold border-l border-white bg-blue-50 leading-tight text-center">4. 做市/换汇<br/><span className="text-[10px] font-normal text-slate-500">FX Spread</span></th>
                            <th className="p-2 font-bold border-l border-white bg-cyan-50 leading-tight text-center">5. 支付编排<br/><span className="text-[10px] font-normal text-slate-500">API/SaaS Fee</span></th>
                            <th className="p-2 font-bold border-l border-white bg-purple-50 leading-tight text-center">6. 链上结算<br/><span className="text-[10px] font-normal text-slate-500">L1 Gas/Network</span></th>
                            <th className="p-2 font-bold border-l border-white bg-rose-50 leading-tight text-center">7. 法币出金<br/><span className="text-[10px] font-normal text-slate-500">Off-ramp Fee</span></th>
                            <th className="p-2 font-bold border-l border-white bg-slate-100 leading-tight text-center">8. 发卡/终端<br/><span className="text-[10px] font-normal text-slate-500">Interchange</span></th>
                          </tr>
                        </thead>
                        <tbody>
                          {clustersOrder.map(clusterName => (
                            <React.Fragment key={clusterName}>
                              <tr className="bg-slate-50/80 border-b border-slate-200">
                                <td colSpan="9" className="p-2 px-4 bg-white">
                                  <span className="text-xs font-bold" style={{ color: clusterColors[clusterName] }}>▍ {clusterName}</span>
                                </td>
                              </tr>
                              {companies.filter(c => c.cluster === clusterName).map(c => {
                                const renderRevCell = (value) => {
                                  if (!value || value === '-') return <div className="text-center text-slate-300 font-light">-</div>;
                                  
                                  const isCore = value.includes('核心:');
                                  return (
                                    <div className="flex justify-center my-1">
                                      <span className={`inline-block px-1.5 py-1 text-[10px] font-bold rounded shadow-sm border leading-tight text-center w-[90%] max-w-[100px] ${isCore ? 'bg-amber-100 text-amber-800 border-amber-300' : 'bg-white text-slate-700 border-slate-200'}`}>
                                        {value}
                                      </span>
                                    </div>
                                  );
                                };

                                return (
                                  <tr key={c.id} className="border-b border-slate-100 hover:bg-slate-50 transition-all">
                                    <td className="p-3 font-bold text-slate-800 bg-white/50">{c.name}</td>
                                    <td className="p-1 border-l border-white bg-emerald-50/30 align-middle">{renderRevCell(c.revenue.onRamp)}</td>
                                    <td className="p-1 border-l border-white bg-amber-50/30 align-middle">{renderRevCell(c.revenue.custody)}</td>
                                    <td className="p-1 border-l border-white bg-orange-50/30 align-middle">{renderRevCell(c.revenue.issuance)}</td>
                                    <td className="p-1 border-l border-white bg-blue-50/30 align-middle">{renderRevCell(c.revenue.fx)}</td>
                                    <td className="p-1 border-l border-white bg-cyan-50/30 align-middle">{renderRevCell(c.revenue.api)}</td>
                                    <td className="p-1 border-l border-white bg-purple-50/30 align-middle">{renderRevCell(c.revenue.settlement)}</td>
                                    <td className="p-1 border-l border-white bg-rose-50/30 align-middle">{renderRevCell(c.revenue.offRamp)}</td>
                                    <td className="p-1 border-l border-white bg-slate-100/50 align-middle">{renderRevCell(c.revenue.cards)}</td>
                                  </tr>
                                );
                              })}
                            </React.Fragment>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* ------------------------------------------------------------------------- */}
                  {/* Tab 7: Overview */}
                  {/* ------------------------------------------------------------------------- */}
                  {activeTab === 'Overview' && (
                    <div className="overflow-x-auto animate-fade-in">
                      <table className="w-full text-left text-sm border-collapse bg-white rounded-xl shadow-sm">
                        <thead>
                          <tr className="bg-slate-100 border-b-2 border-slate-200">
                            <th className="p-4 font-bold text-slate-700 w-[20%] rounded-tl-xl">核心集群定位</th>
                            <th className="p-4 font-bold text-slate-700 w-[30%]">商业牵引力与资金壁垒</th>
                            <th className="p-4 font-bold text-slate-700 w-[25%]">核心护城河 / 业务逻辑</th>
                            <th className="p-4 font-bold text-slate-700 w-[25%] rounded-tr-xl">合作伙伴依赖点</th>
                          </tr>
                        </thead>
                        <tbody className="align-top">
                          {clustersOrder.map(clusterName => (
                            <React.Fragment key={clusterName}>
                              <tr className="bg-slate-50 border-b border-slate-200">
                                <td colSpan="4" className="p-2 px-4">
                                  <span className="text-xs font-bold" style={{ color: clusterColors[clusterName] }}>▍ {clusterName}</span>
                                </td>
                              </tr>
                              {companies.filter(c => c.cluster === clusterName).map(c => (
                                <tr key={c.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                  <td className="p-4">
                                     <div className="font-bold text-slate-800 text-[15px]">{c.name}</div>
                                     <div className="text-xs text-slate-500 mt-1">{c.geo} | {c.fiat}</div>
                                  </td>
                                  <td className="p-4">
                                    <div className="inline-block bg-indigo-50 text-indigo-800 font-semibold px-2 py-1.5 rounded text-xs leading-relaxed border border-indigo-100 shadow-sm mb-2">
                                      {c.traction}
                                    </div>
                                    <div className="text-xs font-bold text-slate-500">💰 融资: {c.fundingStr}</div>
                                  </td>
                                  <td className="p-4 text-slate-600 leading-relaxed text-xs">
                                    {Object.values(c.segments).filter(s => s.mode === '自营').map((s, i) => (
                                      <div key={i} className="mb-1 flex items-start">
                                        <span className="text-emerald-500 mr-1">✓</span> {s.text}
                                      </div>
                                    ))}
                                  </td>
                                  <td className="p-4 text-slate-600 leading-relaxed text-xs">
                                    {c.partnerStr === '无' || c.partnerStr === '完全不碰加密资产' || c.partnerStr === '完全自建 (RPA+自营流动性)' ? (
                                      <span className="text-slate-400 italic">全栈闭环 / 无重大依赖</span>
                                    ) : (
                                      <div className="text-amber-700 bg-amber-50 p-2 rounded border border-amber-100">
                                        {c.partnerStr}
                                      </div>
                                    )}
                                  </td>
                                </tr>
                              ))}
                            </React.Fragment>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
